services:
  mongodb:
    image: mongo:8
    container_name: mongodb-lab
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:?'MONGO_USER is required'}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?'MONGO_PASSWORD is required'}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_HOST_ADDRESS:-127.0.0.1}:${MONGO_HOST_PORT:?'MONGO_HOST_PORT is required'}:27017"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--eval",
          "db.adminCommand('ping')",
          "-u",
          "${MONGO_USER:?'MONGO_USER is required'}",
          "-p",
          "${MONGO_PASSWORD:?'MONGO_PASSWORD is required'}",
          "--authenticationDatabase",
          "admin",
          "--quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: mongo-express-lab
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER:?'MONGO_USER is required'}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD:?'MONGO_PASSWORD is required'}
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGOEXPRESS_USER:?'MONGOEXPRESS_USER is required'}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGOEXPRESS_PASSWORD:?'MONGOEXPRESS_PASSWORD is required'}
    ports:
      - "${MONGOEXPRESS_ADDRESS:-127.0.0.1}:${MONGOEXPRESS_PORT:?'MONGOEXPRESS_PORT is required'}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
